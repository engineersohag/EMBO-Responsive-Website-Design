<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Login Email | EMBO</title>
    <link rel="icon" href="assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <style>
        .google-icon {
            font-size: 20px;
            background: linear-gradient(45deg,
                    #4285F4 0%,
                    #4285F4 25%,
                    #34A853 25%,
                    #34A853 50%,
                    #FBBC05 50%,
                    #FBBC05 75%,
                    #EA4335 75%,
                    #EA4335 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body>
    <main class="tv-login-page tv-login-email-page">
        <div class="container">
            <div class="tv-login-shell">
                <img class="tv-login-logo" src="assets/img/logo.png" alt="EMBO logo">

                <h1 class="tv-login-title">Login to TV</h1>

                <section class="tv-login-card tv-login-email-card" aria-labelledby="tvLoginEmailTitle">
                    <form class="tv-login-form">
                        <div class="form-floating mb-3 login-floating">
                            <input type="email" class="form-control login-input" id="loginEmail"
                                placeholder="Enter Your Email" data-login-email>
                            <label for="loginEmail">Email</label>
                        </div>


                        <div class="form-floating login-floating mb-3 login-password-wrap">
                            <input type="password" class="form-control login-input login-password-input"
                                id="tvLoginPassword" placeholder="Enter password (6-60 characters)" data-login-password>
                            <label for="tvLoginPassword">Password</label>
                            <button type="button" class="login-eye" aria-label="Toggle password visibility"
                                data-tv-password-toggle><i class="fa-solid fa-eye-slash"></i></button>
                        </div>

                        <div class="tv-login-meta">
                            <label class="tv-login-remember">
                                <input type="checkbox" class="form-check-input">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="tv-login-forgot">Forgot password?</a>
                        </div>

                        <button type="submit" class="tv-login-submit">Log In</button>

                        <div class="tv-login-divider"><span>Or</span></div>

                        <div class="tv-login-socials">
                            <a href="#" class="tv-login-social-btn">
                                <i class="fa-brands fa-google google-icon"></i>
                                <span>Google</span>
                            </a>
                            <a href="#" class="tv-login-social-btn">
                                <i class="fa-brands fa-apple"></i>
                                <span>Apple</span>
                            </a>
                        </div>

                        <div class="tv-login-signup">
                            Don't have an account? <a href="#">Sing Up</a>
                        </div>
                    </form>
                </section>

                <a href="tv-login.html" class="tv-login-email-link">LOG IN BY CODE</a>

                <div class="tv-login-help">
                    Need any help? <a href="#">Contact us.</a>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        // ===============================
// TV Login Password Show / Hide
// ===============================
document.addEventListener("DOMContentLoaded", function () {
    const toggleButtons = document.querySelectorAll("[data-tv-password-toggle]");

    toggleButtons.forEach((button) => {
        const wrapper = button.closest(".login-password-wrap");
        if (!wrapper) return;

        const input = wrapper.querySelector(".login-password-input");
        const icon = button.querySelector("i");

        if (!input || !icon) return;

        button.addEventListener("click", function () {
            const isPassword = input.type === "password";

            input.type = isPassword ? "text" : "password";

            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        });
    });
});
    </script>
</body>

</html>
