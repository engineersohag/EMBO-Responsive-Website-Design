<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Login | EMBO</title>
    <link rel="icon" href="assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>
    <main class="tv-login-page">
        <div class="container">
            <div class="tv-login-shell">
                <img class="tv-login-logo mb-5" src="assets/img/logo.png" alt="EMBO logo">

                <h3 class="tv-login-title">Login to TV</h3>

                <section class="tv-login-card" aria-labelledby="tvLoginCodeTitle">
                    <div class="tv-login-card-label" id="tvLoginCodeTitle">Confirmation code</div>
                    <div class="tv-login-code">7590-6578</div>
                </section>

                <section class="tv-login-note">
                    <div class="tv-login-note-title">Note</div>
                    <div class="tv-login-note-divider"></div>

                    <ol class="tv-login-steps">
                        <li>
                            <span class="tv-login-step-num">1</span>
                            <span class="tv-login-step-text">Open Embo on your phone, tablet or computer</span>
                        </li>
                        <li>
                            <span class="tv-login-step-num">2</span>
                            <span class="tv-login-step-text">Go to profile - <strong>Active TV</strong></span>
                        </li>
                        <li>
                            <span class="tv-login-step-num">3</span>
                            <span class="tv-login-step-text">Enter confirmation code to confirm login</span>
                        </li>
                    </ol>
                </section>

                <a href="#" class="tv-login-email-link">LOG IN BY E-MAIL</a>

                <div class="tv-login-help">
                    Need any help? <a href="#">Contact us.</a>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>

</html>
